  <path d="M22.5 6.5 A4 4 0 1 0 22.5 14.5 A3 3 0 0 1 22.5 6.5 Z"
        fill="currentColor" opacity="0.92"/>
  <!-- 远山(2 层) -->
  <path d="M2 22 L7 13 L10 17 L14 11 L18 16 L22 13 L26 18 L30 22 Z"
        fill="currentColor" opacity="0.35"/>
  <path d="M2 22 L5 17 L9 19 L13 14 L17 19 L21 16 L25 19 L30 22 Z"
        fill="currentColor" opacity="0.75"/>
  <!-- 水面细波 -->
  <line x1="2" y1="25" x2="30" y2="25" stroke="currentColor" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  <line x1="6" y1="27.5" x2="18" y2="27.5" stroke="currentColor" stroke-width="0.6" opacity="0.3" stroke-linecap="round"/>
  <line x1="14" y1="29.5" x2="26" y2="29.5" stroke="currentColor" stroke-width="0.6" opacity="0.25" stroke-linecap="round"/>
</svg>
