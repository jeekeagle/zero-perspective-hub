<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <!-- 放大镜:镜片 -->
  <circle cx="13" cy="13" r="8" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- 把手 -->
  <line x1="19.2" y1="19.2" x2="27" y2="27" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
  <!-- 镜片内的十字焦点线(暗示"审视/聚焦") -->
  <line x1="13" y1="8.5" x2="13" y2="17.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="8.5" y1="13" x2="17.5" y2="13" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- 中心小点 -->
  <circle cx="13" cy="13" r="1.3" fill="currentColor" opacity="0.55"/>
</svg>
