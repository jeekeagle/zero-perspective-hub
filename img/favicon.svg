  <circle cx="13" cy="13" r="6.5" stroke="#a8321d" stroke-width="1.8" fill="none"/>
  <!-- 把手 -->
  <line x1="17.7" y1="17.7" x2="24" y2="24" stroke="#a8321d" stroke-width="2.2" stroke-linecap="round"/>
  <!-- 内部十字 -->
  <line x1="13" y1="9.5" x2="13" y2="16.5" stroke="#f3ead3" stroke-width="0.9" stroke-linecap="round" opacity="0.6"/>
  <line x1="9.5" y1="13" x2="16.5" y2="13" stroke="#f3ead3" stroke-width="0.9" stroke-linecap="round" opacity="0.6"/>
  <!-- 中心点 -->
